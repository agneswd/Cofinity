name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: cofinity-vsix
          path: cofinity-*.vsix

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Cofinity ${{ github.ref_name }}
          generate_release_notes: true
          files: cofinity-*.vsix

      - name: Publish to Visual Studio Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath cofinity-*.vsix -p "$VSCE_PAT"

      - name: Skip marketplace publish when token is missing
        if: ${{ secrets.VSCE_PAT == '' }}
        run: echo "VSCE_PAT is not set. Skipping marketplace publish. GitHub Release was still created."